{% extends 'base/layout.html' %}{% block content %}
<h3>Portfolio</h3>
<form method='post' class='row g-2'>
<div class='col-md-2'><input class='form-control' name='scheme_code' placeholder='Code' required></div>
<div class='col-md-3'><input class='form-control' name='scheme_name' placeholder='Fund name' required></div>
<div class='col-md-2'><input class='form-control' name='amount' type='number' step='0.01' placeholder='Amount' required></div>
<div class='col-md-1'><input class='form-control' name='units' type='number' step='0.0001' placeholder='Units' required></div>
<div class='col-md-2'><input class='form-control' name='nav' type='number' step='0.0001' placeholder='Buy NAV' required></div>
<div class='col-md-2'><input class='form-control' name='txn_date' type='date' required></div>
<div class='col-12'><button class='btn btn-primary'>Add</button></div>
</form>
<table class='table mt-3'><tr><th>Fund</th><th>Units</th><th>Current NAV</th><th>Value</th></tr>{% for r in rows %}<tr><td>{{r.scheme_name}}</td><td>{{r.units}}</td><td>{{r.current}}</td><td>{{r.value|round(2)}}</td></tr>{% endfor %}</table>
{% endblock %}
