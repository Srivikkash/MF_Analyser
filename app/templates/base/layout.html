<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MF Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container"><a class="navbar-brand" href="/">MF Analyzer</a>
    <div>
      <a class="btn btn-sm btn-outline-primary" href="/funds/">Funds</a>
      {% if current_user.is_authenticated %}
      <a class="btn btn-sm btn-outline-success" href="/portfolio/">Portfolio</a>
      <a class="btn btn-sm btn-outline-danger" href="/auth/logout">Logout</a>
      {% else %}
      <a class="btn btn-sm btn-primary" href="/auth/login">Login</a>
      {% endif %}
      <button class="btn btn-sm btn-secondary" id="themeToggle">🌓</button>
    </div>
  </div>
</nav>
<main class="container py-4">{% with messages = get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body></html>
